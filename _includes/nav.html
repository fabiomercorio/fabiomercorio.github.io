{%- comment -%}
  Navigation header. Highlights the current page based on `page.nav` in front matter.
  Acceptable values: home, publications, projects, teaching.
{%- endcomment -%}
<header class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">
      <img class="nav-avatar" src="{{ '/assets/img/profile.jpg' | relative_url }}" alt="Fabio Mercorio">
      <span>Fabio Mercorio</span>
    </a>
    <nav>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}"{% if page.nav == 'home' %} aria-current="page"{% endif %}>Home</a></li>
        <li><a href="{{ '/publications.html' | relative_url }}"{% if page.nav == 'publications' %} aria-current="page"{% endif %}>Publications</a></li>
        <li><a href="{{ '/projects.html' | relative_url }}"{% if page.nav == 'projects' %} aria-current="page"{% endif %}>Projects</a></li>
        <li><a href="{{ '/teaching.html' | relative_url }}"{% if page.nav == 'teaching' %} aria-current="page"{% endif %}>Teaching</a></li>
        <li>
          <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </li>
      </ul>
    </nav>
    <button class="nav-toggle" data-nav-toggle aria-label="Open menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
</header>
